# SPDX-License-Identifier: Apache-2.0

openapi: 3.1.0
info:
  title: Landscape OpenAPI Spec
  version: "0.0.8"
  description: API specification for Canonical Landscape.
  contact:
    name: Jan-Yaeger Dhillon
    email: jan.dhillon@canonical.com
    url: https://ubuntu.com/landscape
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: Authentication
    description: Authentication and authorization operations.
  - name: Legacy Actions
    description: Legacy API endpoints for backward compatibility.
  - name: Script Profiles
    description: Operations for managing script profiles, which define scheduled or event-based script execution across targeted computers.
  - name: Scripts
    description: Operations for managing scripts.

servers:
  - url: https://{landscape_root_url}
    variables:
      landscape_root_url:
        default: landscape.canonical.com

security:
  - bearerAuth: []

paths:
  "/api/scripts/{script_id}":
    $ref: "./components/paths/script.yaml#/paths/~1api~1scripts~1{script_id}"
  "/api/scripts/{script_id}/attachments/{attachment_id}":
    $ref: "./components/paths/script.yaml#/paths/~1api~1scripts~1{script_id}~1attachments~1{attachment_id}"
  "/api/scripts/{script_id}:archive":
    $ref: "./components/paths/script.yaml#/paths/~1api~1scripts~1{script_id}:archive"
  "/api/scripts/{script_id}:redact":
    $ref: "./components/paths/script.yaml#/paths/~1api~1scripts~1{script_id}:redact"
  "/api/scripts/{script_id}/script-profiles":
    $ref: "./components/paths/script.yaml#/paths/~1api~1scripts~1{script_id}~1script-profiles"
  "/api/script-profile-limits":
    $ref: "./components/paths/script.yaml#/paths/~1api~1script-profile-limits"
  "/api/script-profiles":
    $ref: "./components/paths/script.yaml#/paths/~1api~1script-profiles"
  "/api/script-profiles/{script_profile_id}":
    $ref: "./components/paths/script.yaml#/paths/~1api~1script-profiles~1{script_profile_id}"
  "/api/script-profiles/{script_profile_id}:archive":
    $ref: "./components/paths/script.yaml#/paths/~1api~1script-profiles~1{script_profile_id}:archive"
  "/api/script-profiles/{script_profile_id}/computers":
    $ref: "./components/paths/script.yaml#/paths/~1api~1script-profiles~1{script_profile_id}~1computers"
  "/api/script-profiles/{script_profile_id}/activities":
    $ref: "./components/paths/script.yaml#/paths/~1api~1script-profiles~1{script_profile_id}~1activities"
  "/api":
    $ref: "./components/paths/actions.yaml#/paths/~1api"
  "/api/login":
    $ref: "./components/paths/auth.yaml#/paths/~1api~1login"
  "/api/login/access-key":
    $ref: "./components/paths/auth.yaml#/paths/~1api~1login~1access-key"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ScriptIdPathParam:
      $ref: "./components/parameters/script.yaml#/ScriptIdPathParam"
    ScriptAttachmentIdPathParam:
      $ref: "./components/parameters/script.yaml#/ScriptAttachmentIdPathParam"
    ScriptProfileIdPathParam:
      $ref: "./components/parameters/script.yaml#/ScriptProfileIdPathParam"
    ScriptProfileArchivedQueryParam:
      $ref: "./components/parameters/script.yaml#/ScriptProfileArchivedQueryParam"
    ScriptProfileNamesQueryParam:
      $ref: "./components/parameters/script.yaml#/ScriptProfileNamesQueryParam"
    LegacyVersionParam:
      $ref: "./components/parameters/legacy.yaml#/LegacyVersionParam"
    LegacyActionParam:
      $ref: "./components/parameters/legacy.yaml#/LegacyActionParam"

  schemas:
    AccessKeyLoginRequest:
      $ref: "./components/schemas/auth.yaml#/AccessKeyLoginRequest"
    Error:
      $ref: "./components/schemas/error.yaml#/Error"
    LegacyScriptAttachment:
      $ref: "./components/schemas/script.yaml#/LegacyScriptAttachment"
    LegacyScriptCode:
      $ref: "./components/schemas/script.yaml#/LegacyScriptCode"
    LegacyScriptCreator:
      $ref: "./components/schemas/script.yaml#/LegacyScriptCreator"
    LoginAccount:
      $ref: "./components/schemas/auth.yaml#/LoginAccount"
    LoginRequest:
      $ref: "./components/schemas/auth.yaml#/LoginRequest"
    LoginResponse:
      $ref: "./components/schemas/auth.yaml#/LoginResponse"
    ScriptAttachment:
      $ref: "./components/schemas/script.yaml#/ScriptAttachment"
    ScriptCreator:
      $ref: "./components/schemas/script.yaml#/ScriptCreatedBy"
    ScriptEditor:
      $ref: "./components/schemas/script.yaml#/ScriptLastEditedBy"
    ScriptProfile:
      $ref: "./components/schemas/script.yaml#/ScriptProfile"
    ScriptResult:
      $ref: "./components/schemas/script.yaml#/ScriptResult"
    ScriptAttachmentResult:
      $ref: "./components/schemas/script.yaml#/ScriptAttachmentResult"
    V1Script:
      $ref: "./components/schemas/script.yaml#/V1Script"
    V2Script:
      $ref: "./components/schemas/script.yaml#/V2Script"
    ScriptProfileLimits:
      $ref: "./components/schemas/script.yaml#/ScriptProfileLimits"
    ScriptProfileEventType:
      $ref: "./components/schemas/script.yaml#/ScriptProfileEventType"
    ScriptProfileEventTrigger:
      $ref: "./components/schemas/script.yaml#/ScriptProfileEventTrigger"
    ScriptProfileScheduleTrigger:
      $ref: "./components/schemas/script.yaml#/ScriptProfileScheduleTrigger"
    ScriptProfileOneTimeTrigger:
      $ref: "./components/schemas/script.yaml#/ScriptProfileOneTimeTrigger"
    ScriptProfileTriggerResponse:
      $ref: "./components/schemas/script.yaml#/ScriptProfileTriggerResponse"
    ScriptProfileScheduleDraftTrigger:
      $ref: "./components/schemas/script.yaml#/ScriptProfileScheduleDraftTrigger"
    ScriptProfileScheduleDraftEditTrigger:
      $ref: "./components/schemas/script.yaml#/ScriptProfileScheduleDraftEditTrigger"
    ScriptProfileOneTimeDraftTrigger:
      $ref: "./components/schemas/script.yaml#/ScriptProfileOneTimeDraftTrigger"
    ScriptProfileTriggerCreateRequest:
      $ref: "./components/schemas/script.yaml#/ScriptProfileTriggerCreateRequest"
    ScriptProfileTriggerPatchRequest:
      $ref: "./components/schemas/script.yaml#/ScriptProfileTriggerPatchRequest"
    ScriptProfileCreatedBy:
      $ref: "./components/schemas/script.yaml#/ScriptProfileCreatedBy"
    ScriptProfileComputersInfo:
      $ref: "./components/schemas/script.yaml#/ScriptProfileComputersInfo"
    ScriptProfileActivityInfo:
      $ref: "./components/schemas/script.yaml#/ScriptProfileActivityInfo"
    ScriptProfileDetail:
      $ref: "./components/schemas/script.yaml#/ScriptProfileDetail"
    ScriptProfileListResponse:
      $ref: "./components/schemas/script.yaml#/ScriptProfileListResponse"
    ScriptProfileCreateBody:
      $ref: "./components/schemas/script.yaml#/ScriptProfileCreateBody"
    ScriptProfilePatchBody:
      $ref: "./components/schemas/script.yaml#/ScriptProfilePatchBody"
    ScriptProfileComputersListResponse:
      $ref: "./components/schemas/script.yaml#/ScriptProfileComputersListResponse"
    ScriptProfileActivitiesListResponse:
      $ref: "./components/schemas/script.yaml#/ScriptProfileActivitiesListResponse"

  responses:
    Unauthorized:
      $ref: "./components/responses/error.yaml#/Unauthorized"
    BadRequest:
      $ref: "./components/responses/error.yaml#/BadRequest"
    NotFound:
      $ref: "./components/responses/error.yaml#/NotFound"
    ScriptNotFound:
      $ref: "./components/responses/error.yaml#/ScriptNotFound"
    ScriptProfileNotFound:
      $ref: "./components/responses/error.yaml#/ScriptProfileNotFound"
    ScriptProfileArchived:
      $ref: "./components/responses/error.yaml#/ScriptProfileArchived"
    ScriptProfileDuplicate:
      $ref: "./components/responses/error.yaml#/ScriptProfileDuplicate"
    ScriptProfileMaxReached:
      $ref: "./components/responses/error.yaml#/ScriptProfileMaxReached"
    ScriptProfileNotEnabled:
      $ref: "./components/responses/error.yaml#/ScriptProfileNotEnabled"
    InvalidCronExpression:
      $ref: "./components/responses/error.yaml#/InvalidCronExpression"
    CannotChangeTriggerType:
      $ref: "./components/responses/error.yaml#/CannotChangeTriggerType"
    GetScriptProfileLimitsResponse:
      $ref: "./components/responses/script.yaml#/GetScriptProfileLimitsResponse"
    ListScriptProfilesResponse:
      $ref: "./components/responses/script.yaml#/ListScriptProfilesResponse"
    GetScriptProfileResponse:
      $ref: "./components/responses/script.yaml#/GetScriptProfileResponse"
    CreateScriptProfileResponse:
      $ref: "./components/responses/script.yaml#/CreateScriptProfileResponse"
    GetScriptProfileComputersResponse:
      $ref: "./components/responses/script.yaml#/GetScriptProfileComputersResponse"
    GetScriptProfileActivitiesResponse:
      $ref: "./components/responses/script.yaml#/GetScriptProfileActivitiesResponse"
    ListScriptProfilesByScriptResponse:
      $ref: "./components/responses/script.yaml#/ListScriptProfilesByScriptResponse"
    LegacyActionResponse:
      $ref: "./components/responses/legacy.yaml#/LegacyActionResponse"
