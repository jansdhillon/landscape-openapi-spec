# SPDX-License-Identifier: Apache-2.0

openapi: 3.1.0
info:
  title: Landscape OpenAPI Spec
  version: "0.1.7"
  description: API specification for Canonical Landscape.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: Authentication
    description: Authentication and authorization operations.
  - name: Legacy API Actions
    description: Legacy API actions.
  - name: Script Profiles
    description: Operations for managing script profiles, which define scheduled or event-based script execution across targeted computers.
  - name: Scripts
    description: Operations for managing scripts.

servers:
  - url: https://{landscape_root_url}
    variables:
      landscape_root_url:
        default: landscape.canonical.com

security:
  - bearerAuth: []

