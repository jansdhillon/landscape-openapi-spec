          in: query
          required: true
          description: "The name of the distribution to create the series in."
          schema:
            type: string
        - name: pockets
          in: query
          description: "Pockets that will be created in the series, they will be in mirror mode by default. (Use pockets.1, pockets.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            default: []
            items:
              type: string
        - name: components
          in: query
          description: "List of components for the created pockets. This parameter is **optional** if no pocket is specified. (Use components.1, components.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            default: []
            items:
              type: string
        - name: architectures
          in: query
          description: "List of architectures for the created pockets. This parameter is **optional** if no pocket is specified (Use architectures.1, architectures.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            default: []
            items:
              type: string
        - name: gpg_key
          in: query
          description: "The name of the GPG key to use to sign packages lists of the created pockets. This parameter is **optional** if no pocket is specified."
          schema:
            type: string
        - name: mirror_uri
          in: query
          description: "The URI to mirror for the created pockets. This parameter is **optional** if no pocket is specified."
          schema:
            type: string
        - name: mirror_series
          in: query
          description: "The remote series to mirror. If not specified, it defaults to the name of the series being created. If a pockets parameter also passed, each of the created pockets will mirror the relevant dists/<mirror_series>-<pocket> repository of the remote archive."
          schema:
            type: string
        - name: mirror_gpg_key
          in: query
          description: "The name of the GPG key to use to verify the mirrored repositories for created pockets. If none is given, the stock Ubuntu archive one will be used."
          schema:
            type: string
        - name: include_udeb
          in: query
          description: "Whether the pocket should include selected components also for .udeb packages (debian-installer). It's 'false' by default."
          schema:
            type: boolean
            default: false
        - name: origin
          in: query
          description: "The origin of the created pocket"
          schema:
            type: string
