    get:
      tags:
        - Legacy API Actions
      operationId: AddPackageFiltersToPocket
      summary: "AddPackageFiltersToPocket"
      description: |
        Add package filters to a repository pocket. The pocket must be in pull
            mode and support blocklist/allowlist filtering.
      parameters:
        - $ref: "../parameters/legacy.yaml#/LegacyVersionParam"
        - name: action
          in: query
          required: true
          description: "API action"
          schema:
            type: string
            default: "AddPackageFiltersToPocket"
        - name: name
          in: query
          required: true
          description: "The name of the pocket to operate on."
          schema:
            type: string
        - name: series
          in: query
          required: true
          description: "The name of the series containing the pocket."
          schema:
            type: string
        - name: distribution
          in: query
          required: true
          description: "The name of the distribution containing the series."
          schema:
            type: string
        - name: packages
          in: query
          required: true
          description: "A list of names of packages to be added or removed from the pocket filter. (Use packages.1, packages.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            items:
              type: string
      responses:
