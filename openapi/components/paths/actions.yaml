  "/api/?action=AssociateAlert":
    get:
      tags:
        - Legacy API Actions
      operationId: AssociateAlert
      summary: "AssociateAlert"
      description: |
        Associate an alert to computers with specific tags or to all computers.
            If a tag with a given name doesn't exist, it will be automatically
            created. An 'all_computers' value of 'true' and a list of tags are mutually
            exclusive. Only one or the other may be passed.
      parameters:
        - $ref: "../parameters/legacy.yaml#/LegacyVersionParam"
        - name: action
          in: query
          required: true
          description: "API action"
          schema:
            type: string
            default: "AssociateAlert"
        - name: name
          in: query
          required: true
          description: "Name of the entity."
          schema:
            type: string
        - name: tags
          in: query
          description: "Tags to change entity association for (Use tags.1, tags.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            default: []
            items:
              type: string
        - name: all_computers
          in: query
          description: "If true, change the 'all_computers' flag state for the entity. If the flag is enabled, associated tags will be kept, but they will not be effective until the flag is disabled."
          schema:
            type: boolean
            default: false
      responses:
        "200":
          $ref: "../responses/legacy.yaml#/LegacyActionResponse"
        "400":
          $ref: "../responses/error.yaml#/BadRequest"
        "401":
          $ref: "../responses/error.yaml#/Unauthorized"
        "403":
