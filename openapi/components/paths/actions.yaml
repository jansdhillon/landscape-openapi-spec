  "/api/?action=GetActivities":
    get:
      tags:
        - Legacy API Actions
      operationId: GetActivities
      summary: "GetActivities"
      description: |
        Retrieve activities associated with the current account, ordered by
            creation time.

            Some activities requested take an extended period of time to complete.
            These activities will not have discrete activity_status values. Instead
            they will report estimated percent complete in the progress field for the
            activity. The progress field will have one of the following values::

              0: if activity is not started
              -1: if an error occurred
              1 to 100: percent complete of ongoing activity

            Common examples of activities with progress would be syncing a pocket
            repository mirror or provisioning a new system.
      parameters:
        - $ref: "../parameters/legacy.yaml#/LegacyVersionParam"
        - name: action
          in: query
          required: true
          description: "API action"
          schema:
            type: string
            default: "GetActivities"
        - name: query
          in: query
          description: "A query string with space separated tokens used to filter the returned result objects."
          schema:
            type: string
            default: ""
        - name: limit
          in: query
          description: "The maximum number of results returned by the method. It defaults to 1000."
          schema:
            type: integer
            default: 1000
        - name: offset
          in: query
          description: "The offset inside the list of results."
          schema:
            type: integer
            default: 0
      responses:
        "200":
          $ref: "../responses/legacy.yaml#/LegacyActionResponse"
        "400":
          $ref: "../responses/error.yaml#/BadRequest"
        "401":
          $ref: "../responses/error.yaml#/Unauthorized"
