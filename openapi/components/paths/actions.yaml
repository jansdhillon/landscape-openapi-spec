        - name: name
          in: query
          required: true
          description: "The name of the role to modify."
          schema:
            type: string
        - name: access_groups
          in: query
          required: true
          description: "A list of names of access groups to add to the role. (Use access_groups.1, access_groups.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
