            default: "CreateUpgradeProfile"
        - name: title
          in: query
          required: true
          description: "A human readable title for this upgrade profile."
          schema:
            type: string
        - name: every
          in: query
          required: true
          description: 'The frequency at which you wish this upgrade profile to be executed. Valid choices are "hour" and "week".'
          schema:
            type: string
        - name: on_days
          in: query
          description: 'A list of days of the week on which the upgrade profile will be run. The day names must be abbreviated to their first two letters, as: "mo", "tu", "we", "th", "fr", "sa", "su". Required when the every parameter is "week" but optional when the every parameter is  "hour". (Use on_days.1, on_days.2, etc. for multiple values)'
          explode: true
          style: form
          schema:
            type: array
            default: []
            items:
              type: string
        - name: at_hour
          in: query
          description: "The hour, in 24h format, at which the upgrade profile will be run."
          schema:
            type: integer
        - name: at_minute
          in: query
          required: true
          description: "The minute of the hour (0-59) at which the upgrade profile will be run."
          schema:
            type: integer
        - name: deliver_within
          in: query
          description: "An optional number of hours within which the upgrade task should be delivered to computers. The window will be from the time specified by this API call (on_days, at_hour, at_minute) until the provided number of hours later. Defaults to 1 hour."
          schema:
            type: integer
            default: 1
        - name: deliver_delay_window
          in: query
          description: "Randomise delivery within the given timeframe specified in minutes."
          schema:
            type: integer
            default: 0
        - name: security_upgrade
          in: query
          description: "(Deprecated) Whether this upgrade is a security upgrade or not."
          schema:
            type: boolean
            default: false
        - name: upgrade_type
          in: query
          description: 'The type of upgrade profile, either "security" or "all".'
          schema:
            type: string
        - name: autoremove
          in: query
          description: "Whether this upgrade should also autoremove old packages."
          schema:
            type: boolean
            default: false
        - name: access_group
          in: query
          description: "An optional name of the access group to create the profile into."
          schema:
            type: string
            default: "global"
        - name: tags
          in: query
          description: "Computer tags to associate with the upgrade profile. (Use tags.1, tags.2, etc. for multiple values)"
