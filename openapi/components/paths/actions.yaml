  "/api/?action=CreatePocket&version=2011-08-01":
    get:
      tags:
        - Legacy API Actions
      operationId: LegacyCreatePocket
      summary: "CreatePocket"
      description: "Create a pocket associated with a series in the account."
      parameters:
        - name: name
          in: query
          required: true
          description: "The name of the pocket. It must be unique within series, start with an alphanumeric character and only contain lowercase letters, numbers and - or + signs."
          schema:
            type: string
        - name: series
          in: query
          required: true
          description: "The name of the series to create the pocket in."
          schema:
            type: string
        - name: distribution
          in: query
          required: true
          description: "The name of the distribution the series belongs to."
          schema:
            type: string
        - name: components
          in: query
          required: true
          description: "A list of components the pocket will handle. (Use components.1, components.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            items:
              type: string
        - name: architectures
          in: query
          required: true
          description: "A list of architectures the pocket will handle. (Use architectures.1, architectures.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            items:
              type: string
        - name: mode
          in: query
          required: true
          description: "The pocket mode. Can be 'pull', 'mirror' and 'upload'."
          schema:
            type: string
        - name: gpg_key
          in: query
          required: true
          description: "The name of the GPG key to use to sign packages lists for this pocket. The GPG key provided must have a private key associated with it."
          schema:
            type: string
        - name: include_udeb
          in: query
          description: "Whether the pocket should include selected components also for .udeb packages (debian-installer). It's 'false' by default."
          schema:
            type: boolean
            default: false
        - name: mirror_uri
          in: query
          description: "The URI to mirror for pockets in 'mirror' mode."
          schema:
            type: string
        - name: mirror_suite
          in: query
          description: "The repository entry under dists/ to mirror for pockets in 'mirror' mode. This parameter is optional and defaults to the same name as local series and pocket. If the suite name ends with a '/', the remote repository is flat (packages are not grouped in components); in this case a single value can be passed for the 'components' parameter. Packages from the remote repository will be mirrored in the specified component."
          schema:
            type: string
        - name: mirror_gpg_key
          in: query
          description: "The name of the GPG key to use to verify the mirrored archive signature. If none is given, the stock Ubuntu archive one will be used."
          schema:
            type: string
        - name: pull_series
          in: query
          description: "The name of the series pull_pocket belongs to. Must be a series in the same distribution series belongs to. If not specified, it defaults to series."
          schema:
            type: string
        - name: pull_pocket
          in: query
          description: "The name of a pocket in current distribution to sync packages from for pockets in 'pull' mode."
          schema:
            type: string
        - name: filter_type
          in: query
          description: "If specified, the type of the filter of the pocket. Can be either 'allowlist' or 'blocklist' (Deprecated blacklist and whitelist)."
          schema:
            type: string
        - name: filter_packages
          in: query
          description: "If specified, the package filters to a repository pocket. The pocket must be in pull mode and support blocklist / allowlist filtering (Deprecated blacklist and whitelist). (Use filter_packages.1, filter_packages.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            default: []
            items:
              type: string
        - name: upload_allow_unsigned
          in: query
          description: "For pockets in upload mode, a boolean indicating whether uploaded packages are required to be signed or not. It's 'false' by default."
          schema:
            type: boolean
            default: false
        - name: origin
          in: query
          description: "The origin of this pocket"
          schema:
            type: string
      responses:
        "200":
          $ref: "../responses/legacy.yaml#/LegacyActionResponse"
        "400":
          $ref: "../responses/error.yaml#/BadRequest"
        "401":
          $ref: "../responses/error.yaml#/Unauthorized"
        "403":
          $ref: "../responses/error.yaml#/Forbidden"

