  "/api/?action=CreateAPTSource&version=2011-08-01":
    get:
      tags:
        - Legacy API Actions
      operationId: LegacyCreateAPTSource
      summary: "CreateAPTSource"
      description: "Create an APT source in the account used for authentication."
      parameters:
        - name: name
          in: query
          required: true
          description: "Name of the APT source. It must be unique within the account, start with an alphanumeric character and only contain lowercase letters, numbers and - or + signs."
          schema:
            type: string
        - name: apt_line
          in: query
          required: true
          description: "The APT line of the source."
          schema:
            type: string
        - name: gpg_key
          in: query
          description: "Name of the GPG key used to sign the repository"
          schema:
            type: string
        - name: access_group
          in: query
          description: "An optional name of the access group to create the APT source into."
          schema:
            type: string
            default: "global"
      responses:
        "200":
          $ref: "../responses/legacy.yaml#/LegacyActionResponse"
        "400":
          $ref: "../responses/error.yaml#/BadRequest"
