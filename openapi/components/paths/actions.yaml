  "/api/?action=GetPackages&version=2011-08-01":
    get:
      tags:
        - Legacy API Actions
      operationId: LegacyGetPackages
      summary: "GetPackages"
      description: |
        Get a list of packages associated with the account used for
            authentication.

            A package is considered installed if dpkg reports it as installed on the
            system.

            A package is considered available if it can be fetched from an APT
            source. Note that this means that it's possible for an installed package
            to be not available.

            A package is considered an upgrade if it's available and if it has a
            version higher than a non-held installed package with the same name.
      parameters:
        - name: query
          in: query
          required: true
          description: "A query string used to select computers to query packages on."
          schema:
            type: string
        - name: search
          in: query
          description: "A string to restrict the search to.  All fields are searched, not just those returned. (e.g., description)"
          schema:
            type: string
        - name: names
          in: query
          description: "Restrict the search to these package names. (Use names.1, names.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            default: []
            items:
              type: string
        - name: installed
          in: query
          description: "If true only packages in the installed state will be returned, if false only packages not installed will be returned. If not given both installed and not installed packages will be returned."
          schema:
            type: boolean
        - name: available
          in: query
          description: "If true only packages in the available state will be returned, if false only packages not available will be returned. If not given both available and not available packages will be returned."
          schema:
            type: boolean
        - name: upgrade
          in: query
          description: "If true, only installable packages that are upgrades for an for an installed one are returned. If false, only installable packages that are not upgrades are returned. If not given, packages will be returned regardless of wether they are upgrades or not."
          schema:
            type: boolean
        - name: held
          in: query
          description: "If true, only installed packages that are held on computers are returned. If false, only packages that are not held on computers are returned. If not given, packages will be returned regardless of the held state."
          schema:
            type: boolean
        - name: offset
          in: query
          description: "The offset inside the list of results."
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: "The maximum number of results returned by the method. It defaults to 1000."
          schema:
            type: integer
            default: 1000
      responses:
        "200":
          $ref: "../responses/legacy.yaml#/LegacyActionResponse"
        "400":
          $ref: "../responses/error.yaml#/BadRequest"
        "401":
          $ref: "../responses/error.yaml#/Unauthorized"
        "403":
          $ref: "../responses/error.yaml#/Forbidden"

