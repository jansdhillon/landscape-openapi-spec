paths:
  "/api/?action=AcceptPendingComputers":
    get:
      tags:
        - Legacy API Actions
      operationId: AcceptPendingComputers
      summary: "AcceptPendingComputers"
      description: |
        Accept a list of pending computers associated with the account used for
            authentication.
      parameters:
        - $ref: "../parameters/legacy.yaml#/LegacyVersionParam"
        - name: action
          in: query
          required: true
          description: "API action"
          schema:
            type: string
            default: "AcceptPendingComputers"
        - name: computer_ids
          in: query
          required: true
          description: "A list of computer IDs to accept. (Use computer_ids.1, computer_ids.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            items:
              type: integer
        - name: existing_ids
          in: query
          description: "A mapping from pending computer IDs to existing ones."
          schema:
            type: object
            default: {}
            additionalProperties:
              type: integer
              description: "The ID of the computer to replace."
        - name: access_group
          in: query
          description: "The access group to put the computers into"
          schema:
            type: string
      responses:
        "200":
          $ref: "../responses/legacy.yaml#/LegacyActionResponse"
        "400":
          $ref: "../responses/error.yaml#/BadRequest"
        "401":
          $ref: "../responses/error.yaml#/Unauthorized"
        "403":
          $ref: "../responses/error.yaml#/Forbidden"

  "/api/?action=AddAPTSourcesToRepositoryProfile":
    get:
      tags:
        - Legacy API Actions
      operationId: AddAPTSourcesToRepositoryProfile
      summary: "AddAPTSourcesToRepositoryProfile"
      description: |
        Add APT sources to a repository profile.
                    An activity will be created to add the given source to the the
                    computers associated with the given profile.
      parameters:
        - $ref: "../parameters/legacy.yaml#/LegacyVersionParam"
        - name: action
          in: query
          required: true
          description: "API action"
          schema:
            type: string
            default: "AddAPTSourcesToRepositoryProfile"
        - name: name
          in: query
          required: true
          description: "Name of the repository profile."
          schema:
            type: string
        - name: apt_sources
          in: query
          required: true
          description: "The names of the APT sources to add. (Use apt_sources.1, apt_sources.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          $ref: "../responses/legacy.yaml#/LegacyActionResponse"
        "400":
          $ref: "../responses/error.yaml#/BadRequest"
        "401":
          $ref: "../responses/error.yaml#/Unauthorized"
        "403":
          $ref: "../responses/error.yaml#/Forbidden"

