          explode: true
          style: form
          schema:
            type: array
            items:
              type: string
        - name: series
          in: query
          required: true
          description: "The name of the series the pockets belongs to."
          schema:
            type: string
        - name: distribution
          in: query
          required: true
          description: "The name of the distribution the series belongs to."
          schema:
