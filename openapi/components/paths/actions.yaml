  "/api/?action=CopyPackageProfile&version=2011-08-01":
    get:
      tags:
        - Legacy API Actions
      operationId: LegacyCopyPackageProfile
      summary: "CopyPackageProfile"
      description: |
        Copy an existing package profile to a package profile with a new name and
            optionally a different title and description.
      parameters:
        - name: name
          in: query
          required: true
          description: "A name of the existing package profile to copy."
          schema:
            type: string
        - name: destination_name
          in: query
          description: "The profile name of the copied package profile."
          schema:
            type: string
        - name: title
          in: query
          description: "A title for the new profile. If not specified, the title of the source profile is used."
          schema:
            type: string
        - name: description
          in: query
          description: "A description for the new profile. If not specified, the title of the source profile is used."
          schema:
            type: string
        - name: access_group
          in: query
          description: "Name of the access group to copy the profile to. Defaults to the origin's access group."
          schema:
            type: string
      responses:
        "200":
          $ref: "../responses/legacy.yaml#/LegacyActionResponse"
        "400":
          $ref: "../responses/error.yaml#/BadRequest"
