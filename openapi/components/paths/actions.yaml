      tags:
        - Legacy API Actions
      operationId: UnsubscribeFromAlert
      summary: "UnsubscribeFromAlert"
      description: "Unsubscribe from an alert."
      parameters:
        - $ref: "../parameters/legacy.yaml#/LegacyVersionParam"
        - name: action
          in: query
          required: true
          description: "API action"
          schema:
            type: string
            default: "UnsubscribeFromAlert"
        - name: alert_type
          in: query
          required: true
          description: "The alert type to remove a subscription from."
          schema:
            type: string
      responses:
        "200":
          $ref: "../responses/legacy.yaml#/LegacyActionResponse"
        "400":
          $ref: "../responses/error.yaml#/BadRequest"
        "401":
          $ref: "../responses/error.yaml#/Unauthorized"
        "403":
          $ref: "../responses/error.yaml#/Forbidden"

  "/api/?action=UpgradePackages":
    get:
      tags:
        - Legacy API Actions
      operationId: UpgradePackages
      summary: "UpgradePackages"
      description: |
        Request upgrading of all packages identified as being upgradable, on all
            computers selected by query.
      parameters:
        - $ref: "../parameters/legacy.yaml#/LegacyVersionParam"
        - name: action
          in: query
          required: true
          description: "API action"
          schema:
            type: string
            default: "UpgradePackages"
        - name: query
          in: query
          required: true
          description: "A qualified criteria to be used in the search."
          schema:
            type: string
        - name: packages
          in: query
          description: "List of package names on which to perform an upgrade. Multiple package names can be supplied like packages.1=foo and packages.2=bar. (Use packages.1, packages.2, etc. for multiple values)"
          explode: true
          style: form
          schema:
            type: array
            default: []
            items:
              type: string
        - name: security_only
          in: query
          description: "If 'true' then only packages with USNs, i.e. security upgrades will be applied."
          schema:
            type: boolean
            default: false
        - name: deliver_after
          in: query
          description: "A time in the future to perform the package upgrade."
          schema:
            type: string
        - name: deliver_delay_window
          in: query
          description: "Randomise delivery within the given time frame specified in minutes"
          schema:
            type: integer
            default: 0
      responses:
        "200":
          $ref: "../responses/legacy.yaml#/LegacyActionResponse"
        "400":
          $ref: "../responses/error.yaml#/BadRequest"
        "401":
          $ref: "../responses/error.yaml#/Unauthorized"
        "403":
          $ref: "../responses/error.yaml#/Forbidden"
