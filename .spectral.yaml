# SPDX-License-Identifier: Apache-2.0

extends: [[spectral:oas, all]]

rules:
  oas3-schema: off
  oas3-unused-component: off
  # The legacy API is RPC-style: all actions are dispatched via ?action= at /api.
  # These paths intentionally include query strings to document each action individually.
  path-not-include-query: off
  info-description-required:
    description: "The info object should have a description"
    given: "$.info"
    then:
      field: description
      function: truthy
    severity: warn

  schema-property-description:
    description: "All properties in schemas should have a description"
    given: "$.components.schemas.*.properties.*"
    then:
      field: description
      function: truthy
    severity: warn
